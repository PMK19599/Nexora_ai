version: '3.8'
services:
  backend:
    build: { context: ., dockerfile: Dockerfile.backend }
    ports: ["5000:5000"]
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/neurolearn
      - JWT_SECRET=${JWT_SECRET:-neurolearn-secret-change-me}
      - JWT_EXPIRE=7d
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLIENT_URL=http://localhost
    depends_on: [mongo]
    restart: unless-stopped
  frontend:
    build: { context: ., dockerfile: Dockerfile.frontend }
    ports: ["80:80"]
    depends_on: [backend]
    restart: unless-stopped
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    restart: unless-stopped
volumes:
  mongo_data:
